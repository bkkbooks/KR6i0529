  - {type: variant, offset: 8458, length: 187, content: '若夫皇德配天，則臣應聖道，魏大丞相渤海國王，冥會如來勝典之目，謂《一切法高王經》也。子尚書令儀同高公能知通法，資福中勝翻譯之功、通法之最，敬集梵＝胡【聖】梵【大】，胡【聖】梵胡

      文，重崇茲業，感佛法力，遇斯妙典，令知法者翻為魏言。大乘學人沙門曇林，婆羅門客＝容【聖】客【大】，容【聖】客容瞿曇流支，在竇大＝太【聖】大【大】，太【聖】大太尉定昌寺譯。興和四年歲次壬戌，季夏六月朔次乙未，二十三日丁巳創譯，八千四百四十九字。出此經福非凡知量，若有形色，空界弗容，書寫、讀誦、供養等者，生死暫居，菩提不遠。其有智慧男子女人，若見聞知，願崇斯福', 宮: ''}
