body:
  text: 元魏婆羅門瞿曇般若流支譯如是我聞一時婆伽婆遊王舍城迦蘭陀竹林與大比丘衆一千二百五十人俱其先悉是編髮梵志其名曰優樓頻騾迦葉等一切皆是大阿羅漢諸漏已盡無復煩惱心得自在善得心解脫善得慧解脫人中大龍應作者作所作已辦離諸重擔逮得己利盡諸有結善得正智心解脫一切心得自在到第一彼岸爾時世尊月十五日於布薩時在露地坐諸比丘衆之所圍繞供養恭敬彼時復有一異比丘初始出家即日受戒詣世尊所到佛所已頭面禮足右繞三匝繞三匝已合掌向佛白言世尊我新出家朝日受戒唯願教我我於僧中云何而食僧中食已云何可消既食食已云何消施又善男子信何義故捨家出家得彼饒益彼異比丘即以偈頌問如來曰我既新出家朝日始受戒唯願為我説云何消僧食何義故捨家出家入佛法唯願説勝義云何消他施如是問已如來即答彼比丘言比丘當知若比丘成就三法應食僧食食已消施彼善男子信何義故捨家出家得彼饒益何等為三比丘當知謂入衆僧作衆僧業僧利相應比丘當知比丘成就此三法者應食僧食食已消施彼善男子信何義故捨家出家得彼饒益爾時世尊即説偈言若人入衆僧造作衆僧業衆僧利相應彼人能消施如是説已彼比丘言如是之義世尊略説我不能解世尊云何比丘名入衆僧作衆僧業又復云何僧利相應時彼比丘即以偈頌問如來曰云何入衆僧云何衆僧業云何衆僧利願説令得知如是請已佛言比丘諦聽諦聽善思念之我今為汝廣説衆僧説衆僧業説衆僧利彼比丘言如是世尊願樂欲聞佛言比丘所言僧者四行四得八富伽羅比丘當知此名為僧應受世間天人供養合掌恭敬無上福田爾時世尊重説偈言有四行四得八種富伽羅此等名為僧無上勝福田如是説已彼比丘言未知世尊何者僧業佛言比丘謂四念處及四正勤四如意足五根五力七菩提分八聖道分比丘當知此名僧業爾時世尊而説偈言若常勤修習寂靜八聖道如是修勝道是名為僧業如是説已彼比丘言未知世尊何者僧利佛言比丘謂僧利者四沙門果何等為四四者所謂須陀洹果斯陀含果阿那含果阿羅漢果比丘當知此名僧利爾時世尊而説偈言大人有大利僧中富伽羅謂四沙門果彼人能消施如是説已彼比丘言如世尊説比丘入僧作衆僧業僧利相應如是比丘能消他食既食食已能消他施彼善男子信何義故捨家出家得彼饒益世尊若人悕望一切智智捨家出家未知世尊彼富伽羅為入僧不作僧業不得僧利不佛言比丘善哉善哉汝善思量汝善能問汝善辨才能問如來如是之義利益多人安樂多人饒益多人憐愍世間利益安樂憐愍天人故如是問如汝所問若人悕望一切智智捨家出家彼富伽羅為入僧不作僧業不得僧利不如是問者我為汝説比丘當知彼富伽羅不入衆僧非作僧業與衆僧利則不相應爾時世尊重説偈言若人悕菩提彼不入衆僧非修衆僧業非僧利相應如是説已彼比丘言未知世尊彼富伽羅若不入僧非作僧業非利相應云何世尊聽其出家聽食僧食云何消施佛言比丘汝且止止勿作此語此不須問彼異比丘復言世尊若此比丘不入衆僧非作僧業非利相應云何消施爾時世尊復言比丘此不須問彼異比丘更復第三問言世尊若此比丘不入衆僧非作僧業非利相應云何消施爾時世尊以彼比丘殷勤三問即放眉間白毫相光照此三千大千世界光明遍滿山河石壁皆悉不現唯見光明遍此三千大千世界而此三千大千世界海中衆生所謂諸魚摩伽羅魚舒摩羅龜等衆生昔未曾見見光明已皆生驚怖又此三千大千世界諸大海中若龍龍女若阿修羅阿修羅女若迦樓羅迦樓羅女昔未曾見見光明已皆生驚怖如是光明皆悉遍至四大王天三十三天炎摩兜率化樂自在梵身梵輔梵衆大梵光明少光無量光天光音淨天及少淨天無量淨天遍淨廣果不煩不熱善見善現阿迦尼吒乃至非想非非想處多千天子覩佛光明一切皆來乃至三千大千世界四大王天次第乃至淨處天衆一切專心來詣佛所到佛所已頭面禮足尊重恭敬合掌向佛住虛空中爾時復有衆多比丘遊行人中既覩光明往詣佛所到佛所已頭面禮足右繞三匝一心正念却坐一面爾時復有比丘比丘尼優婆塞優婆夷既覩光明往詣佛所到佛所已頭面禮足右繞三匝專心正念却坐一面爾時復有三千大千世界諸龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等覩佛光明往詣佛所到佛所已頭面禮足右繞三匝一心正念却坐一面爾時慧命舍利弗從座而起整服一廂右膝著地合掌向佛白言世尊此多比丘比丘尼優婆塞優婆夷等皆來集會世尊此多天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人與非人四大王天三十三天夜摩兜率化樂自在并梵身天乃至無量淨處淨身多千天子覩佛光明皆來集會世尊何故放眉間光願為解説爾時慧命舍利弗即以偈頌問如來曰多千數衆生復億那由他覩佛光明故皆來見世尊世尊以何因復以何因緣此多千億衆今來集此處世尊知其義何故來至此願導師憐愍為我説其因如是問已佛告慧命舍利弗言舍利弗此新出家朝日受戒比丘問言若有比丘行大乘行專心悕求一切智智彼人云何食衆僧食能消他施舍利弗我今欲答彼比丘問為是義故如是無量億千衆生和集來此爾時慧命舍利弗言唯願世尊惟願善逝今答此問佛言舍利弗若説此義有人迷沒何以故舍利弗一切大龍不可思議有大神通大師子吼不可思議師子之吼不可思議大衆生法不可思議此非一切愚癡凡夫聲聞緣覺所能信解故汝三問我皆默然不答此義慧命舍利弗白佛世尊今此會中有比丘比丘尼優婆塞優婆夷天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等能信此義唯願世尊利益彼人答我所問佛言舍利弗若説此義衆生迷沒爾時慧命舍利弗復以偈頌請如來曰善哉願今説菩薩何功德若行菩提心聞已勤精進如是請已佛告慧命舍利弗言舍利弗菩薩摩訶薩天人世間無上福田舍利弗非菩薩摩訶薩不消布施何以故舍利弗菩薩摩訶薩畢竟消施舍利弗若菩薩摩訶薩日日常食一切衆生所施飲食摶如須彌披其袈裟廣長之量如閻浮提劫劫常爾菩薩摩訶薩恆常如是畢竟消施舍利弗若菩薩摩訶薩三千大千世界衆生一一衆生於日日中施其床座廣長之量如四天下高如須彌七寶間錯何等七寶所謂金銀及毗琉璃私頗胝迦赤色真珠車璩馬瑙以用莊嚴師子之座天衣覆上舍利弗若菩薩摩訶薩一一衆生於日日中如是布施菩薩受取隨意受用若坐臥等舍利弗菩薩摩訶薩常如是受常如是用畢竟消施何以故舍利弗乃至初發菩提之心菩薩摩訶薩即發心日已是一切聲聞緣覺衆生福田舍利弗菩薩摩訶薩一一衆生於日日中以如是色七處宮殿其量廣長如四天下謂閻浮提西瞿耶尼東弗婆提北鬱單越廣長如是一一別處垂七寶簾彼一一處七寶網縵高幢幡蓋種種天寶以為莊嚴彼殿高大乃至他化自在天處彼一一處種種寶樹處處遍有彼一切樹隨意所須一切皆得一一樹中皆出樂音彼諸樹中有樹能出種種諸香有樹能出種種妙華有樹能出種種諸果彼殿彼處多有池水八分相應滿彼池中底布金沙彼池多有七寶蓮花充滿其中彼一切池用毗琉璃以為階道普池周匝七寶欄楯彼池岸邊多有無量師子座處億那由他百千敷具以敷其上以天妙花遍散地處舍利弗若菩薩摩訶薩如是色殿如是色座如是色處若坐若臥若行若住若語若默皆悉隨意舍利弗若菩薩摩訶薩一切衆生於日日中如是色殿如是色座如是色處得已受用舍利弗如是菩薩摩訶薩於一切衆生畢竟消施如是乃至初發心者何以故舍利弗菩薩摩訶薩一切衆生無上福田舍利弗汝今見此種姓尊貴大富饒財有大安樂所謂剎利大姓婆羅門大姓長者大姓居士大姓人中之王轉輪聖王七寶成就四天王天三十三天釋提桓因炎摩天子兜率天子化樂天子如是他化自在天子梵娑婆主次第乃至色無色中生處衆生若人得住初果二果三果四果復有獲得辟支佛道若人欲覺阿耨多羅三藐三菩提舍利弗此如是等一切皆於菩薩中生菩薩所化應如是知何以故舍利弗菩薩摩訶薩行菩薩已次第獲得阿耨多羅三藐三菩提覺轉于法輪於菩薩所得聞法已如是得入須陀洹果斯陀含果阿那含果阿羅漢果辟支佛道次第乃至阿耨多羅三藐三菩提覺聞布施已則能布施以布施故則得生於剎利大姓婆羅門大姓長者大姓得為人王轉輪聖王聞説戒已能受持戒受持戒故則得生於四天王天三十三天炎摩兜率化樂自在聞四無量故得修行以修行故生色界天舍利弗此門如是應當善知此一切法皆依菩薩菩薩所化舍利弗譬如阿那婆達多龍王池處出四大河何等為四所謂強伽辛頭博叉斯陀大河彼四大河入四大海何者為四殑伽大河五百眷屬流滿東海辛頭大河五百眷屬流滿南海博叉大河五百眷屬流滿西海斯陀大河五百眷屬流滿北海舍利弗於意云何此四大河流向四方如彼次第入四大海舍利弗彼四大河流向四方頗有衆生隨須用不慧命舍利弗言無量衆生受用得力所謂沙門及婆羅門人非人等世尊彼四大河悉能遍滿稻田豆田若摩沙田大小麥田異異種種諸穀豆等悉能充遍彼穀豆等多人受用所謂沙門及婆羅門人非人等佛言舍利弗於意云何彼四大海頗有衆生隨須用不慧命舍利弗白佛言世尊無量衆生受用得力謂勝衆生陸地衆生水中衆生所謂魚龜摩伽羅魚坻𮬚宜羅蝦蟇鵝鴨及魚師等復是無量大衆生處所謂諸龍乾闥婆阿修羅迦樓羅等無量衆生人與非人受用得力謂珠真珠及毗琉璃珂與珊瑚因陀尼羅大青寶珠牟娑羅寶迦羅婆寶馬瑙寶等復有大價異大寶珠在大海中為人受用佛言舍利弗於意云何彼四大海以何因緣有如是力慧命舍利弗白佛言世尊阿那婆達多龍王池水因緣如是勢力佛言善哉善哉舍利弗阿那婆達多龍王離三種畏何等為三所謂得離迦樓羅畏離熱沙畏若餘龍王行欲法時蛇形色相彼阿那婆達多龍王行欲之時無此形相舍利弗阿那婆達多龍王宮中坐禪比丘住在彼處舍利弗阿那婆達多龍王宮中神通比丘有威德者住在彼處舍利弗阿那婆達多龍王隨住何宮若有入者無諸衰惱慧命舍利弗白佛言世尊希有世尊阿那婆達多龍王宮殿成就如是未曾有法希有世尊如是龍宮彼三種過一切皆無希有世尊隨何衆生入彼宮者免三種過希有世尊彼龍王宮神通威德坐禪比丘入彼處住希有世尊彼龍池處出四大河多人受用彼四大河生四大海大衆生處無量百千諸衆生等受用之處所謂沙門及婆羅門人非人等受用之處世尊阿那婆達多龍王成就如是無量功德佛言舍利弗菩薩摩訶薩亦復如是舍利弗譬如阿那婆達多龍王離三種畏舍利弗菩薩摩訶薩亦復如是已得出過三惡道畏何等三畏一地獄畏二餓鬼畏三畜生畏舍利弗譬如阿那婆達多龍王池水出四大河多人受用舍利弗菩薩摩訶薩亦復如是有四攝法攝取衆生何等為四布施愛語利行同事此四攝法菩薩所行多人受用又舍利弗譬如阿那婆達多龍王池處因緣有四大海如是如是舍利弗菩薩出生薩婆若智又舍利弗譬如大海無量衆生依住安樂如是如是舍利弗三有衆生依薩婆若得安樂住三者所謂欲有色有及無色有舍利弗此門如是應當善知舍利弗所有三千大千世界衆生安樂一切皆因菩薩而生依菩薩有何以故舍利弗發菩提心常行不斷次第相續乃至受記得受記已阿耨多羅三藐三菩提覺阿耨多羅三藐三菩提覺已轉于法輪若諸沙門若婆羅門若天若魔若梵若餘皆不能轉如是正法以聞法故出生四衆所謂比丘比丘尼優婆塞優婆夷以彼因緣得無量樂得天人樂得解脫樂舍利弗汝意云何此法何生慧命舍利弗白佛言世尊從菩薩生佛言舍利弗汝意云何三有所攝若利若養隨何等物一切皆是菩薩先時所作之恩豈有人能報恩者不慧命舍利弗言世尊無能報也何以故菩薩出生一切法故佛言舍利弗譬如有人貧無財物有大富者多有財物以悲愍心捨而施之多百多千無量無數百千萬億皆能捨與如是次第施第二人施第三人施第四人乃至百千乃至無量百千衆生如是乃至一切衆生彼大富者所有財物一切捨與又復施與一切無畏令除怖畏所有怨憎繫縛鬪諍如是等畏皆令免脫又復令離惡道怖畏又與無量天人安樂彼受施中有一衆生為報恩故破己一物以為百分以一分物與前施者既與物已作如是心我已報恩舍利弗汝意云何若此丈夫如是饒益一切衆生如是利益一切衆生彼一衆生所破之物百分中一與前施者報恩盡不慧命舍利弗言世尊不能盡也佛言如是如是舍利弗菩薩亦爾舍利弗如悲心者利益一切而一衆生一物百分與悲心者一分之物如是如是舍利弗有一施者一切欲樂供養瞻視大乘行者乃至命盡彼人雖作如是供養猶不報恩爾時世尊告慧命舍利弗言善哉善哉舍利弗汝今真是我之弟子隨順我教善解我語舍利弗一切衆生於菩薩所若捨自肉若皮若筋若骨若身如是乃至百千到捨於菩薩恩百分之中不報其一如是乃至千分億分百千億分乃至數分不報其一算數譬喻所不能及何以故舍利弗菩薩之恩世間天人阿修羅等所不能報舍利弗若善男子若善女人發起如來一切智心則能報恩何以故舍利弗若有能發阿耨多羅三藐三菩提心者一切衆生之所受用舍利弗譬如此處閻浮提中生栴檀樹始生牙時已能除滅童男童女藥相應病及其葉生能除婦女男子之病又時增長成栴檀樹若有人來住其蔭中彼人離病彼栴檀樹若出華時能與天樂彼栴檀樹若生果時光明周遍十方世界光明既出隨何衆生心憶念者則得不老不病之法彼栴檀樹若有斫伐分析破裂取其材木而將去者不畏貧窮彼栴檀樹若有人能取其材木用為屋舍入其中者不寒不熱不飢不渴如是如是舍利弗彼栴檀樹皆悉有用無不用者樹始生時已住受用生已有用增長有用華出有用果出有用斫伐破裂材木有用作屋有用舍利弗菩薩摩訶薩亦復如是初發阿耨多羅三藐三菩提心修四攝法與衆生樂如栴檀芽既發心已三解脫門心得增長何等為三謂空無相無願等門如樹生葉次後得住無生法忍如樹增長次復成就一切智智如樹華出次入無餘涅槃界中如樹有果碎身舍利量如芥子住持利益諸衆生界如人斫伐彼栴檀樹將木而去如來舍利利益衆生亦復如是如栴檀樹取木作舍入者安樂如是如來入涅槃已諸修行人入如來寺除熱清涼舍利弗此門如是應當善知舍利弗若善男子若善女人其有能發阿耨多羅三藐三菩提心者佛法不斷一切衆生得天人樂及解脫樂常行不斷舍利弗若天人樂及解脫樂常行不斷舍利弗豈有能説與其相似與等者不慧命舍利弗白佛言世尊無能與等彼富伽羅人天并梵修羅世間雖與善樂不能報恩若於一劫若於百劫若於千劫若於億劫若億千劫不能報恩佛言如是舍利弗若善男子若善女人欲報無上一切恩者彼人應發阿耨多羅三藐三菩提心舍利弗此發心者無上報恩如恩相似相似報恩無相似衆生無譬喻衆生欲報其恩者生不相似心生此無上心舍利弗欲報過去如來恩者唯應發此阿耨多羅三藐三菩提心舍利弗欲報未來如來恩者亦惟發此阿耨多羅三藐三菩提心舍利弗欲報今時十方世界諸佛世尊現在現命現住如來無上恩者亦唯發此阿耨多羅三藐三菩提心舍利弗二富伽羅供養如來無上供養何等為二有富伽羅一切漏盡有富伽羅發阿耨多羅三藐三菩提心爾時世尊即説偈言説二富伽羅供養於如來菩薩阿羅漢是二富伽羅非世間財物三有中資生能作善供養供養彼大人若以天人中勝色聲味觸捨施彼大人不名善供養若資生供養非無上供養若發菩提心是無上供養若天人世間及以魔世間一切欲者與非是勝報恩大人不乏少不生悕望心如是之大人更無勝供養若人心悕望無上供養佛彼發菩提心取未來成佛若人常悕望欲作無量福彼發菩提心堅固勤精進若人欲悕望發心修無量彼人發精進欲得佛菩提若人悕天樂捨離一切苦彼人則修習佛菩提因緣若欲見無量阿僧祇諸佛正信殷重心欲取佛菩提若人欲行到無量異世界彼人勤精進欲取佛菩提若欲見過佛有如是憶念彼發菩提心修行菩提行若人欲得見未來世諸佛彼發菩提心修行菩提行若欲見供養現在世諸佛彼人心樂欲利益諸衆生若人悲心普愍一切衆生彼人欲發起無上佛菩提若欲與衆生無上無量樂彼人欲發起第一佛菩提若見苦衆生而生於悲心彼人欲發起佛菩提因緣若生如是心我覺無上道彼無量功德一切不可説如是説已慧命舍利弗白佛言世尊世尊向來説如是法幾許衆生發阿耨多羅三藐三菩提心佛告慧命舍利弗言舍利弗汝且止止舍利弗汝今何用問如是義何以故舍利弗若使如來一切智智説此義者衆生迷惑何以故舍利弗以佛如來有無量戒無量三昧有無量慧無量神通有無量智舍利弗譬如虛空不可量取云何虛空可思議不慧命舍利弗言世尊不可思議何以故以彼虛空無人已知今知當知佛言如是如是舍利弗如來所知一切衆生一切聲聞一切緣覺不能已知今知當知何以故佛之所知非諸聲聞緣覺境界慧命舍利弗白佛言世尊希有世尊彼諸衆生乃有如是善決定意發阿耨多羅三藐三菩提心佛言如是如是舍利弗當有菩薩善決定意慧命舍利弗言世尊菩薩云何善決定意佛言舍利弗如閻浮提所有衆生若在陸行若在水行若在空行若在地行彼如是等一切衆生本身盡已皆得人身若有一人教彼諸人令住五戒十善業道舍利弗汝意云何彼富伽羅以是因緣得多福不舍利弗言甚多世尊彼人福德不可譬喻佛言舍利弗我復更説汝今應知如是之人教閻浮提一切衆生令住五戒十善業道所有福德若復有人令一衆生住信行法其福勝彼舍利弗汝意云何若復有人令閻浮提一切衆生住信行法彼富伽羅以是因緣得福多不舍利弗言甚多世尊彼人福德不可少分譬喻而説佛言舍利弗如是之人令閻浮提一切衆生住信行道所有福德若復有人令一衆生住法行道其福勝彼舍利弗汝意云何若復有人令閻浮提一切衆生住法行道彼富伽羅以是因緣得福多不舍利弗言甚多世尊彼人福德不可譬喻佛言舍利弗如是之人令閻浮提一切衆生住法行道所有福德若復有人令一衆生住於初果其福勝彼舍利弗汝意云何若復有人令閻浮提一切衆生住於初果彼富伽羅以是因緣得福多不舍利弗言甚多世尊彼人福德不可譬喻佛言舍利弗如是之人令閻浮提一切衆生住於初果所有福德若復有人令一衆生住第二果其福勝彼舍利弗汝意云何若復有人令閻浮提一切衆生住第二果彼富伽羅以是因緣得福多不舍利弗言甚多世尊彼人福德不可譬喻佛言舍利弗如是之人令閻浮提一切衆生住第二果所有福德若復有人令一衆生住第三果其福勝彼舍利弗若復有人令閻浮提一切衆生住第三果所有福德若復有人令一衆生住羅漢果其福勝彼舍利弗若復有人令閻浮提一切衆生住羅漢果所有福德若復有人令一衆生得緣覺道其福勝彼舍利弗若復有人令閻浮提一切衆生住緣覺道所有福德若復有人令一衆生住阿耨多羅三藐三菩提其福勝彼舍利弗若復有人令閻浮提一切衆生住阿耨多羅三藐三菩提所有福德若復有人令一衆生住不退法其福勝彼舍利弗若復有人令閻浮提一切衆生住不退法所有福德若復有人令一衆生畢竟安住無生法忍其福勝彼舍利弗若復有人令閻浮提一切衆生畢竟安住無生法忍所有福德若復有人令一衆生速疾安住一切智智其福勝彼舍利弗若復有人令閻浮提一切衆生速疾安住一切智智所有福德若復有人為他廣説能生菩提能破壞魔示陰無我能離諸界破散諸入盡滅煩惱淨分種子破壞染分此一切法高王法門其福勝彼舍利弗置閻浮提一切衆生舍利弗譬如乃至遍四天下世界衆生如是乃至一千世界二千世界三千世界乃至無量百千世界東西南北四維上下如是十方於一一方恆河沙等世界衆生有色無色陸行水行卵生胎生濕生化生如是乃至有想無想彼如是等一切衆生本身盡已皆得人身若有一人教彼諸人令住五戒十善業道舍利弗彼富伽羅以是因緣得福多不舍利弗言甚多世尊甚多善逝彼得無量阿僧祇福佛言舍利弗汝今應知如是譬喻舍利弗如是十方諸世界中一切衆生若人令住信行法行須陀洹果斯陀含果阿那含果阿羅漢果辟支佛道住阿耨多羅三藐三菩提住不退法不生法忍一切智智所有福德若復有人為他廣説此一切法高王法門所得福德舍利弗此福德聚勝前福德第一清淨無上無比舍利弗此勝法門善決定意菩薩摩訶薩之所修行菩薩之行如是應知舍利弗若人得聞此一切法高王法門當知是人即是菩薩摩訶薩也彼人不退阿耨多羅三藐三菩提是福田者無等等者不相似者是憶念者是過度者是寂靜者是調御者性寂靜者是解脫者是丈夫者是師子者第一男者勝丈夫者大丈夫者龍者天者天中天者無障礙者是不縛者作所作者所作辦者一切所作皆悉辦者即是無邊功德聚者爾時世尊即説偈言若人行菩提是決定衆生彼人無惡意有無明如來若發菩提心其福不可喻一切世間福無如菩提福無邊世界中所有諸衆生若人令勝上轉轉更增上彼人轉上上上上得福利於此菩提心彼福如微塵若人廣説此無上修多羅及學此經者彼人是福田若人聞此經盡本性清淨彼人名寂靜是佛之真子若聞此經時勇健審丈夫名調御解脫天中天師子若人説此經經中無上經天中天之天衆生中無上如是説已慧命舍利弗白佛言世尊希有世尊如來乃能於此經中如是略説菩薩之行菩薩乃於阿僧祇劫行菩薩行猶故未得無上佛智世尊此經中説無上佛智世尊若有衆生從如來口聞此法門如是衆生快得善利第一善利慧命舍利弗白佛言世尊如我解佛所説法義乃至過去已入涅槃諸佛世尊已為衆生説此法門此法門者彼過去佛所説法中最為第一世尊於未來世諸佛世尊當為衆生説此法門此法門者彼未來佛所説法中最為第一謂一切法高王法門世尊於今現在現命現住諸佛世尊今為衆生説此法門此法門者彼現在佛所説法中最為第一世尊我從世尊先已曾聞多多法門善哉世尊今復為我説此法門佛告慧命舍利弗言舍利弗此修多羅佛自知時如衆生心信解之相知心而説舍利弗是佛所知非諸聲聞緣覺境界舍利弗説此法時八萬四千人先未曾發菩提之心今聞此經發菩提心六十千衆生得無生法忍有七十億欲界諸天先未曾發菩提之心今聞此經發菩提心三億衆生得柔順忍無量地天諸龍夜叉先未曾發菩提之心今聞此經發菩提心舍利弗如來觀知如是義故廣為衆生説此法門爾時無量百千衆生比丘比丘尼優婆塞優婆夷合掌向佛瞻仰尊顏目不暫捨爾時世尊怡然微笑於面門中放無量色種種色光遍照三千大千世界此勝光明遍已還入世尊面門爾時慧命舍利弗白佛言世尊云何世尊何因何緣如是微笑唯願世尊為我解説佛告慧命舍利弗言舍利弗此多比丘比丘尼優婆塞優婆夷合掌觀佛目不暫捨汝為見不舍利弗言已見世尊佛言舍利弗此四部衆行大乘行行菩薩行舍利弗如彼心行我悉知之舍利弗若以如來過去不得未來不得現在不得舍利弗此衆生行陰中不得界中不得入中不取舍利弗此菩薩行無上無等如來説此菩薩行時於此三千大千世界皆悉大動謂動遍動等遍動勇遍勇等遍勇吼遍吼等遍吼起遍起等遍起覺遍覺等遍覺魔王波旬退其宮殿餘異魔身皆悉退墮此有偈言朝壞魔軍力不能更復起以正覺所説一切無有餘陰魔煩惱魔瘦弱無勢力以聞如來説一切法空故見諸魔驚怖聞不戲論法彼法既不生云何得有死彼魔波旬既墮地已即向如來而説偈言善哉獨大佛願速安慰我我今恐命盡愁憂之所縛時魔波旬得佛安慰忽然不現如來既説此法門已慧命舍利弗心意歡喜彼新出家無夏比丘并諸天人及阿修羅乾闥婆等聞世尊説皆大歡喜一切法高王經翻譯之記若夫皇德配天則臣應聖道魏大丞相渤海國王冥會如來勝典之目謂一切法高王經也子尚書令儀同高公能知通法資福中勝翻譯之功通法之最敬集梵文重崇茲業感佛法力遇斯妙典令知法者翻為魏言大乘學人沙門曇林婆羅門客瞿曇流支在竇大尉定昌寺譯興和四年歲次壬戌季夏六月朔次乙未二十三日丁巳創譯八千四百四十九字出此經福非凡知量若有形色空界弗容書寫讀誦供養等者生死暫居菩提不遠其有智慧男子女人若見聞知願崇斯福
